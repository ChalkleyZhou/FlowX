services:
  flowx:
    image: flowx:latest
    container_name: flowx
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PORT: "${PORT:-3000}"
      WEB_PORT: "${WEB_PORT:-4173}"
      DATABASE_URL: "${DATABASE_URL:-file:/data/dev-current.db}"
      AI_EXECUTOR_PROVIDER: "${AI_EXECUTOR_PROVIDER:-codex}"
      AI_EXECUTOR_DEFAULT_PROVIDER: "${AI_EXECUTOR_DEFAULT_PROVIDER:-codex}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      CURSOR_API_KEY: "${CURSOR_API_KEY:-}"
      FLOWX_CREDENTIAL_MASTER_KEY: "${FLOWX_CREDENTIAL_MASTER_KEY:-}"
      FLOWX_CURSOR_REQUIRE_USER_CREDENTIAL: "${FLOWX_CURSOR_REQUIRE_USER_CREDENTIAL:-false}"
      FLOWX_CODEX_REQUIRE_USER_CREDENTIAL: "${FLOWX_CODEX_REQUIRE_USER_CREDENTIAL:-false}"
      CODEX_HOME: "${CODEX_HOME:-/data/.codex}"
      DINGTALK_APP_ID: "${DINGTALK_APP_ID:-}"
      DINGTALK_APP_SECRET: "${DINGTALK_APP_SECRET:-}"
      DINGTALK_AGENT_ID: "${DINGTALK_AGENT_ID:-}"
      GIT_AUTHOR_NAME: "${GIT_AUTHOR_NAME:-FlowX Bot}"
      GIT_AUTHOR_EMAIL: "${GIT_AUTHOR_EMAIL:-flowx@example.com}"
      GIT_COMMITTER_NAME: "${GIT_COMMITTER_NAME:-}"
      GIT_COMMITTER_EMAIL: "${GIT_COMMITTER_EMAIL:-}"
    volumes:
      - flowx-data:/data
      - flowx-workdir:/app/.flowx-data
      - /root/.ssh:/root/.ssh:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: flowx-nginx
    restart: unless-stopped
    depends_on:
      - flowx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/flowx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  flowx-data:
  flowx-workdir:
