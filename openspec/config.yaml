context: |
  Language Policy:
  - 所有文档必须使用简体中文
  - 所有说明必须使用中文
  - JSON key / token 名称必须英文
  - 禁止输出纯英文解释

  Design Rules:
  - 使用 Design Token 体系
  - 使用 DTCG 格式
